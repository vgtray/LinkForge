services:
  front:
    build:
      context: .
      dockerfile: Dockerfile.front
    expose:
      - "3000"
    environment:
      - DATABASE_URL=postgresql://linkforge:${DB_PASSWORD:-password}@db:5432/linkforge_db
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dokploy-network
      - linkforge-internal

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    expose:
      - "4000"
    environment:
      - DATABASE_URL=postgresql://linkforge:${DB_PASSWORD:-password}@db:5432/linkforge_db
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-me}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:3000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dokploy-network
      - linkforge-internal

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=linkforge
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=linkforge_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkforge -d linkforge_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - linkforge-internal

volumes:
  postgres_data:
  uploads_data:
networks:
  dokploy-network:
    external: true
  linkforge-internal:
    driver: bridge